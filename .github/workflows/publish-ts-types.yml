name: Publish TypeScript types to npm

# Publishes @actenon/protocol-types from typescript/ to the npm registry.
#
# Triggers on:
#   - Tag pushes matching ts-types-v* (e.g. ts-types-v1.0.0)
#   - Manual workflow_dispatch
#
# Uses the org-wide NPM secret (automation token with publish rights on
# the @actenon scope). The token must be registered as an org secret at
# github.com/organizations/Actenon/settings/secrets/actions named `NPM`.

on:
  push:
    tags:
      - "ts-types-v*"
  workflow_dispatch:

jobs:
  verify:
    name: Build + test @actenon/protocol-types
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        working-directory: typescript
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: typescript
        run: bun run typecheck

      - name: Run tests
        working-directory: typescript
        run: bun test

      - name: Verify package contents (npm pack dry-run)
        working-directory: typescript
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/ts-types-v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        working-directory: typescript
        run: bun install --frozen-lockfile

      - name: Set up npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Publish @actenon/protocol-types
        working-directory: typescript
        run: npm publish --access public

      - name: Verify publication
        run: |
          sleep 5
          PACKAGE_VERSION=$(node -p "require('./typescript/package.json').version")
          echo "Published @actenon/protocol-types@${PACKAGE_VERSION}"
          echo "View at: https://www.npmjs.com/package/@actenon/protocol-types/v/${PACKAGE_VERSION}"
