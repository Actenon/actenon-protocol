name: Publish @actenon/protocol to npm

# Publishes @actenon/protocol (the runtime package) from typescript-runtime/
# to the npm registry.
#
# Triggers on:
#   - Tag pushes matching ts-runtime-v* (e.g. ts-runtime-v1.0.0)
#   - Manual workflow_dispatch
#
# Uses npm provenance (GitHub OIDC → npm trust) instead of a long-lived
# npm token. This requires the @actenon/protocol package on npm to be
# configured to trust this GitHub repository's OIDC issuer.
#
# To configure provenance:
#   1. Go to https://www.npmjs.com/package/@actenon/protocol/access
#   2. Under "Provenance", enable "Require provenance"
#   3. Link the GitHub repository Actenon/actenon-protocol
#
# No NPM_TOKEN secret is needed — npm verifies the GitHub OIDC token
# directly.

on:
  push:
    tags:
      - "ts-runtime-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm provenance (OIDC)

jobs:
  verify:
    name: Build + test @actenon/protocol
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Set up Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: typescript-runtime
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: typescript-runtime
        run: bun run typecheck

      - name: Build (tsc → dist/)
        working-directory: typescript-runtime
        run: bun run build

      - name: Run conformance suite
        working-directory: typescript-runtime
        run: bun run tests/conformance.ts

      - name: Verify package contents (npm pack dry-run)
        working-directory: typescript-runtime
        run: npm pack --dry-run

  publish:
    name: Publish to npm with provenance
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/ts-runtime-v')

    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Set up Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: typescript-runtime
        run: bun install --frozen-lockfile

      - name: Build (tsc → dist/)
        working-directory: typescript-runtime
        run: bun run build

      - name: Publish @actenon/protocol with provenance
        working-directory: typescript-runtime
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_ACTENON }}
          # NOTE: --provenance uses GitHub OIDC, not this token. The token
          # is still required for npm auth until the package is configured
          # for keyless provenance. Once configured, this can be removed.

      - name: Verify publication
        run: |
          sleep 5
          PACKAGE_VERSION=$(node -p "require('./typescript-runtime/package.json').version")
          echo "Published @actenon/protocol@${PACKAGE_VERSION}"
          echo "View at: https://www.npmjs.com/package/@actenon/protocol/v/${PACKAGE_VERSION}"
