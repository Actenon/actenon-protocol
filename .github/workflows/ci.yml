name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  conformance:
    name: Conformance suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify YAML->JSON catalogue is in sync
        # Enforces that the pre-compiled JSON catalogue matches the YAML source.
        # This is what makes the "zero runtime dependencies" claim machine-verified:
        # the JSON ships in the wheel, the YAML is the human-editable source.
        run: python scripts/compile_yaml_to_json.py --check

      - name: Run conformance suite (129 vectors)
        run: python -m pytest conformance/python/ -v

  lint:
    name: Lint + format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.8

      - name: Verify zero runtime dependencies
        # Enforces that pyproject.toml declares `dependencies = []`. The
        # README's "Zero dependencies" badge is a claim about runtime deps;
        # this check makes the claim machine-verified rather than editorial.
        run: |
          python - <<'EOF'
          import tomllib, sys
          with open('pyproject.toml','rb') as f:
              data = tomllib.load(f)
          deps = data['project'].get('dependencies', [])
          if deps:
              print(f'FAIL: actenon-protocol must have zero runtime deps, found: {deps}', file=sys.stderr)
              sys.exit(1)
          print('OK: zero runtime dependencies')
          EOF

      - name: Verify YAML->JSON catalogue is in sync
        run: python scripts/compile_yaml_to_json.py --check

      - name: Check generated Python badge
        run: python scripts/sync_badges.py --check

      - name: Check README registry installs
        run: python scripts/check_readme_installs.py

      - name: Check README ecosystem table in sync with ecosystem.yaml
        # On protocol's own CI we install from the local checkout so the
        # renderer being tested is the one on this branch. Consumer repos
        # (kernel, permit, scan) install from PyPI instead, which works
        # once a release with the renderer is published.
        run: |
          pip install --quiet .
          python -m actenon_protocol.ecosystem --check README.md --repo actenon-protocol

      - name: Lint with ruff
        run: ruff check python/ conformance/python/

      - name: Format check with ruff
        run: ruff format --check python/ conformance/python/

  typescript:
    name: TypeScript types check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install TS deps
        working-directory: typescript
        run: bun install

      - name: TypeScript typecheck
        working-directory: typescript
        run: bun run typecheck

      - name: TS tests
        working-directory: typescript
        run: bun test
